name: Release desktop app

# Builds a single-file distributable per OS:
#   - Linux:   AppImage (self-contained, executable, no install step)
#   - Windows: portable .exe (self-contained, no installer/no install step)
#   - macOS:   zip (best-effort; not a hard requirement of this project)
#
# Cross-compiling the Windows target from Linux needs Wine and is flaky in
# CI, so each OS builds its own target natively on its own runner instead.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_args: --linux AppImage
          - os: windows-latest
            build_args: --win portable
          - os: macos-latest
            build_args: --mac zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check syntax
        run: pnpm run test

      - name: Build ${{ matrix.os }} distributable
        run: pnpm exec electron-builder --publish=never ${{ matrix.build_args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stash-phash-inspector-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release with all platform binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
